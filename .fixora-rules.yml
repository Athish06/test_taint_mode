- id: fixora-wrapper-controller-download-path-traversal
  patterns:
  - pattern-inside: "def controller_download(...):\n  ..."
  - pattern-either:
    - pattern: service_read_upload(...)
    - pattern: $OBJ.service_read_upload(...)
  message: 'Path Traversal via `filename`

    Vulnerable Sink: Passes untrusted data directly to `service_read_upload`.'
  severity: ERROR
  languages:
  - python
  metadata: &id001
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: HIGH
    wrapper_defined_in: controllers.py
    wraps:
    - service_read_upload
    modules_used:
    - services
    vulnerable_parameter: filename
    malicious_payload: ../sensitive_data
    exploit_explanation: The attacker-controlled filename is passed directly to the
      service_read_upload function, allowing access to arbitrary files.
    exploit_injected_example: controller_download(filename = ../sensitive_data)
    impact_summary: Attackers can read sensitive files on the server, potentially
      leading to data breaches.
    cwe: &id012
    - CWE-22
    owasp: &id013
    - A01:2021
